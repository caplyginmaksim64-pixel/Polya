<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Поля 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    .center {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 10;
    }
    .name {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-weight: 700;
      font-size: clamp(64px, 16vw, 148px);
      letter-spacing: 0.14em;
      color: #fff;
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 1.6s ease, transform 1.6s ease;
      text-shadow:
        0 0 20px rgba(255,0,0,0.9),
        0 0 50px rgba(255,0,0,0.6),
        0 0 110px rgba(200,0,0,0.35);
    }
    .name.show { opacity: 1; transform: scale(1); }
    .tagline {
      margin-top: 8px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(13px, 3vw, 22px);
      letter-spacing: 0.3em;
      color: rgba(255,120,120,0.85);
      opacity: 0;
      transition: opacity 1.8s ease 0.5s;
      text-shadow: 0 0 18px rgba(255,0,0,0.5);
    }
    .tagline.show { opacity: 1; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="center">
  <div class="name" id="name">Поля</div>
  <div class="tagline" id="tag">with love ♡</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, S;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
  S = Math.min(W, H) * 0.038;
}
resize();
window.addEventListener('resize', resize);

/* ── heart point ── */
function hp(t) {
  return {
    x:  16 * Math.pow(Math.sin(t), 3),
    y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
  };
}

/* ── plasma particle (fibrous red glow like screenshot) ── */
const WORDS  = "You are the best girl in this world".split(" ");
const N      = 420;
const NAME_T = 5200;

class P {
  constructor(i) {
    this.i = i;
    const t = (i / N) * Math.PI * 2;
    const h = hp(t);
    this.tx = CX + h.x * S;
    this.ty = CY + h.y * S;

    /* start scattered at top */
    this.sx = CX + (Math.random() - 0.5) * W * 0.85;
    this.sy = -50 - Math.random() * 250;
    this.x  = this.sx;
    this.y  = this.sy;

    this.word = WORDS[i % WORDS.length];
    this.fs   = 8 + Math.random() * 7;
    this.alpha = 0;
    this.arrived = false;
    this.bp = Math.random() * Math.PI * 2;

    /* trace — fibrous tail */
    this.trace = [];
    this.traceLen = 18 + Math.floor(Math.random() * 20);

    /* red palette */
    const r = 180 + Math.floor(Math.random() * 75);
    const g = Math.floor(Math.random() * 30);
    this.col  = `rgb(${r},${g},0)`;
    this.glow = `rgba(255,30,30,0.55)`;

    this.delay   = 0;
    this.flyDur  = 1500 + Math.random() * 1000;
  }

  update(now) {
    const loc = now - this.delay;
    if (loc < 0) { this.alpha = 0; return; }

    const px = this.x, py = this.y;

    if (!this.arrived) {
      const p = Math.min(loc / this.flyDur, 1);
      const e = 1 - Math.pow(1 - p, 3);
      const arc = Math.sin(p * Math.PI) * ((this.i % 2 === 0) ? 60 : -60);
      this.x = this.sx + (this.tx - this.sx) * e + arc * (1 - e);
      this.y = this.sy + (this.ty - this.sy) * e;
      this.alpha = Math.min(p * 4, 0.9);

      /* store trace */
      this.trace.push({ x: px, y: py });
      if (this.trace.length > this.traceLen) this.trace.shift();

      if (p >= 1) {
        this.arrived = true;
        this.x = this.tx; this.y = this.ty;
        this.trace = [];
      }
    } else {
      this.bp += 0.03;
      this.alpha = 0.72 + 0.25 * Math.sin(this.bp);
    }
  }

  draw() {
    if (this.alpha < 0.01) return;

    /* draw fibrous trace */
    if (this.trace.length > 1) {
      for (let k = 1; k < this.trace.length; k++) {
        const a = (k / this.trace.length) * this.alpha * 0.45;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = this.col;
        ctx.shadowColor = this.glow;
        ctx.shadowBlur  = 6;
        ctx.lineWidth   = 0.7;
        ctx.beginPath();
        ctx.moveTo(this.trace[k-1].x, this.trace[k-1].y);
        ctx.lineTo(this.trace[k].x,   this.trace[k].y);
        ctx.stroke();
        ctx.restore();
      }
    }

    /* draw word */
    ctx.save();
    ctx.globalAlpha   = this.alpha;
    ctx.font          = `bold ${this.fs}px Arial, sans-serif`;
    ctx.fillStyle     = this.col;
    ctx.shadowColor   = this.glow;
    ctx.shadowBlur    = 10;
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.fillText(this.word, this.x, this.y);
    ctx.restore();
  }
}

/* ── build & sort top→bottom ── */
const parts = Array.from({ length: N }, (_, i) => new P(i));
const sorted = [...parts].sort((a, b) => a.ty - b.ty);
sorted.forEach((p, rank) => {
  p.delay = (rank / N) * 4400 + Math.random() * 100;
});

/* ── ambient word floaters ── */
class F {
  constructor(ry) {
    this.reset(ry);
  }
  reset(ry) {
    this.x  = Math.random() * W;
    this.y  = ry ? Math.random() * H : H + 16;
    this.w  = WORDS[Math.floor(Math.random() * WORDS.length)];
    this.fs = 7 + Math.random() * 7;
    this.vy = 0.2 + Math.random() * 0.45;
    this.ph = Math.random() * Math.PI * 2;
    this.alpha = 0.05 + Math.random() * 0.1;
    const r = 160 + Math.floor(Math.random() * 95);
    this.col = `rgb(${r},0,0)`;
  }
  update() {
    this.y  -= this.vy;
    this.ph += 0.018;
    this.x  += Math.sin(this.ph) * 0.35;
    if (this.y < -16) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha   = this.alpha;
    ctx.font          = `bold ${this.fs}px Arial, sans-serif`;
    ctx.fillStyle     = this.col;
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.fillText(this.w, this.x, this.y);
    ctx.restore();
  }
}

const floaters = Array.from({ length: 28 }, () => new F(true));

/* ── render loop ── */
let t0 = null, nameShown = false;

function loop(ts) {
  if (!t0) t0 = ts;
  const now = ts - t0;

  /* slow fade trail — keeps fibrous glow */
  ctx.fillStyle = 'rgba(0,0,0,0.14)';
  ctx.fillRect(0, 0, W, H);

  floaters.forEach(f => { f.update(); f.draw(); });
  parts.forEach(p    => { p.update(now); p.draw(); });

  if (!nameShown && now >= NAME_T) {
    nameShown = true;
    document.getElementById('name').classList.add('show');
    document.getElementById('tag').classList.add('show');
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
